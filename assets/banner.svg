<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#7ee787"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Mic icon -->
  <g transform="translate(60, 70)">
    <rect x="20" y="0" width="24" height="48" rx="12" fill="url(#accent)"/>
    <path d="M 8 24 Q 8 52 32 52 Q 56 52 56 24" stroke="url(#accent)" stroke-width="4" fill="none"/>
    <line x1="32" y1="52" x2="32" y2="64" stroke="url(#accent)" stroke-width="4"/>
    <line x1="20" y1="64" x2="44" y2="64" stroke="url(#accent)" stroke-width="4"/>
  </g>

  <!-- Title -->
  <text x="180" y="80" font-family="-apple-system, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#f0f6fc">voicemeet-pro</text>

  <!-- Tagline -->
  <text x="180" y="115" font-family="-apple-system, Helvetica, sans-serif" font-size="18" fill="#8b949e">Premium local meeting notes — zero cost, fully private</text>

  <!-- Features -->
  <text x="180" y="145" font-family="-apple-system, Helvetica, sans-serif" font-size="14" fill="#7ee787">🎙️ Live transcription  •  🧠 AI summary  •  📄 PDF/DOCX/MD export  •  🔒 100% local</text>

  <!-- Stars badge -->
  <rect x="640" y="20" width="140" height="28" rx="14" fill="#21262d" stroke="#30363d"/>
  <text x="660" y="39" font-family="-apple-system, Helvetica, sans-serif" font-size="13" fill="#f0f6fc">⭐ Star this repo</text>
</svg>
